<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
        />
        <title>Dorf Flohmarkt Uettingen 2026</title>

        <style>
            body {
                margin: 0;
                font-family: Arial, sans-serif;
                text-align: center;
                background-image: linear-gradient(
                    to right,
                    #0ebfe0 0%,
                    #fbdf56 100%
                );
                max-width: 100%; 
            }

            h2 {
                color: white;
                margin: 10px 0;
                flex: 0 0 auto;
            }

            .topic {
                background-color: white;
                padding: 10px;
                margin: 0;
                font-size: 12px;
                font-weight: 600;
                flex: 0 0 auto;
                border-radius: 20px;
                margin-bottom: 10px;
                margin-left: 20px;
                margin-right: 20px;
            }

            .announcement {
                margin: 100px;
                font-size: 18px;
                font-weight: 600;
                line-height: 2;
                flex: 1;
            }

            .viewport {
                margin: 20px;
                max-width: 100%;
                height: auto;
                width: 95%; /* 100% - 5% links - 5% rechts */
                margin: 0 auto; /* zentriert */
            }
            .viewport img {
                width: 100%;
                height: auto; /* Seitenverhältnis bleibt erhalten */
                display: block;
            }
        </style>
    </head>

    <body>
        <h2>Dorf Flohmarkt Uettingen 2026</h2>
        <p class="topic">
            📅 Sonntag, 17. Mai ⏳ 10:00 bis 16:00 Uhr ☀️ findet bei jedem
            Wetter statt ☔
        </p>

        <!-- announcement -->
        <!-- <p class="announcement">
            Der Ortsplan mit allen Ständen und Höfen ist anfang Mai verfügbar
        </p> -->

        <!-- map -->
        <div class="viewport" id="viewport">
            <img
                src="Flohmarktkarte-2026.png"
                alt="Dorf Flohmarkt Uettingen Karte 2026"
                id="zoom-img"
            />
            <br />
            <img
                src="Strassenverzeichnis-2026.png"
                alt="Dorf Flohmarkt Uettingen Straßenplan 2026"
                id="zoom-img"
            />
        </div>

        <!-- thank_you -->

            Vielen Dank für Euren Besuch und Teilnahme! 
            <br />
            <br />
            Wir freuen uns auf das nächste Jahr!
        </p> -->

    </body>
</html>
